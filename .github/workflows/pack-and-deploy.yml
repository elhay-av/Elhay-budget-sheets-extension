name: Pack Extension & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  pack-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for extension changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            extension:
              - 'manifest.json'
              - 'background.js'
              - 'content.js'
              - '*.png'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Pack extension into ZIP
        run: |
          mkdir -p _build
          zip -r _build/finanda-export-v${{ steps.version.outputs.version }}.zip \
            manifest.json \
            background.js \
            content.js \
            icon.png \
            icon16.png \
            icon48.png \
            icon128.png \
            -x "*.DS_Store"

      - name: Upload extension ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: finanda-export-v${{ steps.version.outputs.version }}-zip
          path: _build/finanda-export-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Upload to Chrome Web Store
        if: steps.filter.outputs.extension == 'true' || github.event_name == 'workflow_dispatch'
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: _build/finanda-export-v${{ steps.version.outputs.version }}.zip
          extension-id: ${{ secrets.EXTENSION_ID }}
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          refresh-token: ${{ secrets.REFRESH_TOKEN }}
          publish-target: trustedTesters

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p _site
          cp -r docs/* _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
